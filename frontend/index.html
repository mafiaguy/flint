<script>
  // ═══════════════════════════════════════════════════

  // NEVER put real values here — they go in GitHub Secrets.

  window.FLINT_CONFIG = {
    SUPABASE_URL: "__SUPABASE_URL__",
    SUPABASE_KEY: "__SUPABASE_KEY__",

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:#08080c;color:#eeeef2;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#08080c}::-webkit-scrollbar-thumb{background:#1c1c2a;border-radius:3px}
::selection{background:rgba(245,158,11,.2);color:#f59e0b}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
input,textarea,select{font-family:inherit;color:#eeeef2;background:#0e0e14;border:1px solid #1c1c2a;border-radius:8px;padding:10px 14px;font-size:14px;outline:none;width:100%;box-sizing:border-box;caret-color:#f59e0b}
input::placeholder,textarea::placeholder{color:#4e4e5a}
input:focus,textarea:focus{border-color:#f59e0b44}
a{color:#3b82f6;text-decoration:none}

<body>
<div id="root"></div>

<script type="text/babel" data-type="module">
const { useState, useEffect, useCallback } = React;

// ── Config ──
const CFG = window.FLINT_CONFIG || {};
const M = "'SF Mono','JetBrains Mono','Fira Code',monospace";

// ── Supabase client ──
const sb = {
  async query(table, params="") {
    if (!CFG.SUPABASE_URL) return null;
    try {
      const r = await fetch(`${CFG.SUPABASE_URL}/rest/v1/${table}${params}`, {
        headers: { apikey: CFG.SUPABASE_KEY, Authorization: `Bearer ${CFG.SUPABASE_KEY}` }
      });
      return r.ok ? await r.json() : null;
    } catch { return null; }
  },
  async insert(table, data) {
    if (!CFG.SUPABASE_URL) return null;
    try {
      const r = await fetch(`${CFG.SUPABASE_URL}/rest/v1/${table}`, {
        method:"POST",
        headers:{ apikey:CFG.SUPABASE_KEY, Authorization:`Bearer ${CFG.SUPABASE_KEY}`, "Content-Type":"application/json", Prefer:"return=representation" },
        body: JSON.stringify(data)
      });
      return r.ok ? await r.json() : null;
    } catch { return null; }
  },
  async edge(fn, body) {
    if (!CFG.SUPABASE_URL) return null;
    try {
      const r = await fetch(`${CFG.SUPABASE_URL}/functions/v1/${fn}`, {
        method:"POST",
        headers:{ Authorization:`Bearer ${CFG.SUPABASE_KEY}`, "Content-Type":"application/json" },
        body: JSON.stringify(body)
      });
      return r.ok ? await r.json() : null;
    } catch { return null; }
  }
};

// ── Colors ──
const C = {bg:"#08080c",c1:"#0e0e14",c2:"#15151e",br:"#1c1c2a",t1:"#eeeef2",t2:"#8e8e9a",t3:"#4e4e5a",acc:"#f59e0b",red:"#ef4444",grn:"#22c55e",blu:"#3b82f6",pur:"#a78bfa",grad:"linear-gradient(135deg,#f59e0b,#ef4444,#ec4899)"};

const FLAGS = {in:"🇮🇳",gb:"🇬🇧",de:"🇩🇪",fr:"🇫🇷",us:"🇺🇸",ca:"🇨🇦",au:"🇦🇺",ie:"🇮🇪",remote:"🌍",other:"🌐",sg:"🇸🇬"};
const CATS = ["All","SRE","Platform","Security","DevSecOps","Infrastructure","DevOps","Cloud","Engineering"];
const QUICK = ["Site Reliability Engineer","Platform Engineer","Cloud Security","DevSecOps","DevOps","Infrastructure"];

// ── Components ──
function ScanBar() {
  return <div style={{height:2,background:C.c2,borderRadius:1,overflow:"hidden",margin:"10px 0"}}><div style={{height:"100%",width:"30%",background:C.grad,animation:"scan 1.4s ease infinite"}}/></div>;
}

function Chip({active,color=C.acc,children,onClick}) {
  return <button onClick={onClick} style={{padding:"5px 14px",fontSize:12,border:`1px solid ${active?color+"55":C.br}`,borderRadius:99,background:active?color+"15":"transparent",color:active?color:C.t3,cursor:"pointer",fontWeight:500,fontFamily:M,transition:"all .15s",letterSpacing:.3}}>{children}</button>;
}

function JobCard({job,applied,onApply,onMatch}) {
  const [exp,setExp] = useState(false);
  const days = job.posted ? Math.max(0,Math.floor((Date.now()-new Date(job.posted))/864e5)) : null;
  const srcC = job.source==="LinkedIn"?"#0a66c2":job.source==="Greenhouse"?"#3b8132":job.source==="Lever"?"#5c5ce0":job.source==="HackerNews"?"#ff6600":C.acc;

  return (
    <div style={{background:C.c1,border:`1px solid ${applied?C.grn+"33":C.br}`,borderRadius:16,padding:18,animation:"up .35s ease",transition:"border-color .3s",position:"relative"}}>
      {applied && <div style={{position:"absolute",top:12,right:12,background:C.grn+"22",color:C.grn,fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:99,fontFamily:M,letterSpacing:1}}>APPLIED</div>}
      <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
        <div style={{width:44,height:44,borderRadius:12,background:srcC+"15",border:`1px solid ${srcC}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:srcC,flexShrink:0,fontFamily:M}}>{job.company?.charAt(0)||"?"}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:5}}>
            <span style={{fontSize:10,fontFamily:M,fontWeight:700,color:srcC,letterSpacing:1}}>{(job.source||"").toUpperCase()}</span>
            <span style={{fontSize:11,color:C.t3}}>{FLAGS[job.country]||"🌐"}</span>
            {job.remote && <span style={{fontSize:10,color:C.grn,fontFamily:M}}>🌍 Remote</span>}
            {days!==null && <span style={{fontSize:10,color:C.t3,fontFamily:M}}>⏱ {days===0?"Today":`${days}d`}</span>}
          </div>
          <h3 style={{margin:"0 0 4px",fontSize:16,fontWeight:700,color:C.t1,lineHeight:1.3,paddingRight:applied?70:0}}>{job.title}</h3>
          <p style={{margin:0,fontSize:14,color:C.t2,fontWeight:500}}>{job.company}</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:C.t3}}>{job.location}</p>
          {job.salary && job.salary!=="—" && <p style={{margin:"6px 0 0",fontSize:14,fontWeight:700,color:C.grn,fontFamily:M}}>{job.salary}</p>}
        </div>
      </div>
      {exp && <div style={{marginTop:14,padding:14,background:C.bg,borderRadius:10,border:`1px solid ${C.br}`,fontSize:13,lineHeight:1.7,color:C.t2,maxHeight:200,overflow:"auto"}}>{job.description||"No description available."}</div>}
      <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap",alignItems:"center"}}>
        {job.category && <span style={{fontSize:10,fontFamily:M,color:C.t3,background:C.c2,padding:"4px 10px",borderRadius:99}}>{job.category}</span>}
        <div style={{flex:1}}/>
        <button onClick={()=>setExp(!exp)} style={{padding:"7px 14px",fontSize:12,border:`1px solid ${C.br}`,borderRadius:8,background:"transparent",color:C.t2,cursor:"pointer"}}>{exp?"Hide":"Details"}</button>
        <button onClick={()=>onMatch(job)} style={{padding:"7px 14px",fontSize:12,border:`1px solid ${C.pur}33`,borderRadius:8,background:"transparent",color:C.pur,cursor:"pointer",fontWeight:600}}>⚡ Match</button>
        <button onClick={()=>onApply(job)} style={{padding:"8px 20px",background:applied?C.grn+"22":C.grad,color:applied?C.grn:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>{applied?"✓ Applied":"Apply →"}</button>
      </div>
    </div>
  );
}

function Modal({children,onClose}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16,animation:"fadeIn .2s"}} onClick={e=>e.target===e.currentTarget && onClose()}>
      <div style={{background:C.c1,border:`1px solid ${C.br}`,borderRadius:20,maxWidth:560,width:"100%",maxHeight:"88vh",overflow:"auto",padding:28,animation:"up .3s ease"}}>{children}</div>
    </div>
  );
}

function ApplyModal({job,qa,profile,onClose,onApply}) {
  const [ans,setAns] = useState(()=>{const o={};qa.forEach((_,i)=>o[i]=qa[i].a);return o});
  const [extras,setExtras] = useState([]);
  const [nq,setNq] = useState("");const [na,setNa] = useState("");
  const [cover,setCover] = useState("");const [genL,setGenL] = useState(false);
  const allQ = [...qa,...extras];

  const gen = async() => {
    setGenL(true);
    const r = await sb.edge("ai",{type:"cover",job:{title:job.title,company:job.company,desc:(job.description||"").slice(0,600)},profile});
    setCover(r?.text||"Connect Supabase Edge Functions for AI. See README.");
    setGenL(false);
  };

  return (
    <Modal onClose={onClose}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <div style={{fontSize:10,fontFamily:M,letterSpacing:2,color:C.acc,marginBottom:6}}>APPLYING TO</div>
          <h3 style={{color:C.t1,fontSize:20,fontWeight:800,margin:0}}>{job.title}</h3>
          <p style={{color:C.t2,fontSize:13,margin:"4px 0 0"}}>{job.company} · {job.location}</p>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:C.t3,cursor:"pointer",fontSize:20,alignSelf:"flex-start"}}>✕</button>
      </div>

      <div style={{fontSize:10,fontFamily:M,letterSpacing:2,color:C.t3,marginBottom:10}}>YOUR SAVED ANSWERS</div>
      {allQ.map((q,i)=>(
        <div key={i} style={{marginBottom:10}}>
          <label style={{fontSize:12,fontWeight:600,color:C.t2,display:"block",marginBottom:3}}>{q.q}</label>
          <input value={ans[i]??q.a} onChange={e=>setAns(p=>({...p,[i]:e.target.value}))}/>
        </div>
      ))}

      <div style={{background:C.bg,borderRadius:12,padding:14,margin:"16px 0"}}>
        <div style={{fontSize:10,fontFamily:M,letterSpacing:2,color:C.pur,marginBottom:8}}>NEW PORTAL QUESTION (saves for next time)</div>
        <input placeholder="Question..." value={nq} onChange={e=>setNq(e.target.value)} style={{marginBottom:6}}/>
        <div style={{display:"flex",gap:8}}>
          <input placeholder="Answer..." value={na} onChange={e=>setNa(e.target.value)} style={{flex:1}}/>
          <button onClick={()=>{if(nq){setExtras(p=>[...p,{q:nq,a:na}]);setAns(p=>({...p,[allQ.length]:na}));setNq("");setNa("");}}} style={{padding:"10px 18px",background:"transparent",border:`1px solid ${C.pur}`,borderRadius:8,color:C.pur,cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap"}}>+ Save</button>
        </div>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"16px 0 8px"}}>
        <span style={{fontSize:10,fontFamily:M,letterSpacing:2,color:C.t3}}>AI COVER LETTER</span>
        <button onClick={gen} disabled={genL} style={{padding:"6px 16px",background:"transparent",border:`1px solid ${C.pur}55`,borderRadius:8,color:C.pur,cursor:genL?"wait":"pointer",fontSize:12,fontWeight:600,opacity:genL?.5:1}}>⚡ {genL?"Generating...":"Generate"}</button>
      </div>
      <textarea value={cover} onChange={e=>setCover(e.target.value)} placeholder="Click Generate or write your own..." rows={5} style={{resize:"vertical",lineHeight:1.6}}/>

      <div style={{display:"flex",gap:10,marginTop:20}}>
        <a href={job.url} target="_blank" rel="noopener noreferrer" style={{flex:1,padding:14,background:C.c2,color:C.t1,borderRadius:12,textAlign:"center",fontWeight:700,fontSize:14,border:`1px solid ${C.br}`,display:"block"}}>Open on {job.source} ↗</a>
        <button onClick={()=>{onApply(job,ans,extras,cover);onClose();}} style={{padding:"14px 28px",background:C.grn,color:"#000",border:"none",borderRadius:12,fontWeight:800,fontSize:14,cursor:"pointer"}}>✓ Applied</button>
      </div>
    </Modal>
  );
}

function MatchModal({job,profile,onClose}) {
  const [res,setRes] = useState("");const [ld,setLd] = useState(true);
  useEffect(()=>{(async()=>{
    const r = await sb.edge("ai",{type:"match",job:{title:job.title,company:job.company,location:job.location,desc:(job.description||"").slice(0,800)},profile});
    setRes(r?.text||`Match analysis for ${job.title} at ${job.company}\n\nConnect Supabase + Groq to enable AI matching.\nSee the README for setup.`);
    setLd(false);
  })();},[]);
  return (
    <Modal onClose={onClose}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{fontSize:10,fontFamily:M,letterSpacing:2,color:C.pur,marginBottom:6}}>AI MATCH ANALYSIS</div>
          <h3 style={{color:C.t1,fontSize:16,fontWeight:700,margin:0}}>{job.title} · {job.company}</h3>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:C.t3,cursor:"pointer",fontSize:20}}>✕</button>
      </div>
      {ld ? <div style={{textAlign:"center",padding:40}}><div style={{width:36,height:36,border:`3px solid ${C.br}`,borderTopColor:C.acc,borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto"}}/><p style={{color:C.t3,fontSize:13,marginTop:14}}>Analyzing...</p></div>
      : <div style={{whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.8,color:C.t2,background:C.bg,padding:18,borderRadius:12,border:`1px solid ${C.br}`}}>{res}</div>}
    </Modal>
  );
}

// ── Main App ──
function App() {
  const [ready,setReady] = useState(false);
  const [profile,setProfile] = useState({});
  const [qa,setQA] = useState([]);
  const [tab,setTab] = useState("hunt");
  const [jobs,setJobs] = useState([]);
  const [loading,setLoading] = useState(false);
  const [search,setSearch] = useState("");
  const [cat,setCat] = useState("All");
  const [applied,setApplied] = useState([]);
  const [appliedJobs,setAppliedJobs] = useState([]);
  const [applyM,setApplyM] = useState(null);
  const [matchM,setMatchM] = useState(null);
  const [status,setStatus] = useState("");
  const [aiQ,setAiQ] = useState("");const [aiR,setAiR] = useState("");const [aiLd,setAiLd] = useState(false);
  const [step,setStep] = useState(0);
  const [form,setForm] = useState({name:"",role:"",exp:"",skills:"",notice:"",comp:"",expected:"",visa:"",mode:"No Preference"});

  const uf = (k,v)=>setForm(p=>({...p,[k]:v}));

  const loadJobs = async()=>{
    const data = await sb.query("jobs","?order=posted.desc&limit=80");
    if(data?.length) { setJobs(data); setStatus(`${data.length} jobs from latest scrape`); }
    else setStatus("Connect Supabase to load scraped jobs. See README.");
  };

  const doSearch = async()=>{
    setLoading(true);
    const data = await sb.edge("search-jobs",{query:search});
    if(data?.jobs?.length){
      const ids = new Set(jobs.map(j=>j.id));
      const fresh = data.jobs.filter(j=>!ids.has(j.id));
      setJobs(p=>[...fresh,...p]);
      setStatus(`${data.jobs.length} results for "${search}"`);
    }
    setLoading(false);
  };

  const finishSetup = ()=>{
    const p = {...form};
    setProfile(p);
    const q = [];
    if(p.notice)q.push({q:"Notice period?",a:p.notice});
    if(p.comp)q.push({q:"Current compensation?",a:p.comp});
    if(p.expected)q.push({q:"Expected compensation?",a:p.expected});
    if(p.visa)q.push({q:"Work authorization?",a:p.visa});
    if(p.mode)q.push({q:"Preferred work mode?",a:p.mode});
    if(p.exp)q.push({q:"Years of experience?",a:p.exp+" years"});
    setQA(q);
    setReady(true);
    loadJobs();
  };

  const handleApply = (job,ans,extras,cover)=>{
    setApplied(p=>[...new Set([...p,job.id])]);
    setAppliedJobs(p=>[...p,{...job,appliedAt:new Date().toISOString(),cover}]);
    if(extras.length)setQA(p=>[...p,...extras]);
    sb.insert("applications",{job_id:job.id,title:job.title,company:job.company,location:job.location,source:job.source,url:job.url,cover_letter:cover});
  };

  const filtered = jobs.filter(j=>{
    const mc = cat==="All"||(j.category||"").toLowerCase().includes(cat.toLowerCase());
    const ms = !search||[j.title,j.company,j.location,j.description].join(" ").toLowerCase().includes(search.toLowerCase());
    return mc&&ms;
  });

  // ── Onboarding ──
  if(!ready) {
    return (
      <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{maxWidth:460,width:"100%",animation:"up .5s ease"}}>
          {step===0 && <>
            <div style={{textAlign:"center",marginBottom:32}}>
              <div style={{fontSize:48,marginBottom:12}}>🔥</div>
              <h1 style={{fontSize:42,fontWeight:900,background:C.grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:-1}}>FLINT</h1>
              <p style={{color:C.t2,fontSize:14,marginTop:6,letterSpacing:2,fontFamily:M}}>SPARK YOUR NEXT MOVE</p>
            </div>
            {["Jobs scraped fresh from 9 sources — LinkedIn, Greenhouse, Lever, Adzuna & more","AI matching & cover letters powered by Llama 3.3 70B","One-click apply with saved Q&A that learns from every portal","Completely free. Zero API keys. Just use it."].map((t,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:14,animation:`up .4s ease ${i*.08}s both`}}>
                <span style={{color:C.acc,flexShrink:0}}>→</span>
                <span style={{color:C.t2,fontSize:14,lineHeight:"22px"}}>{t}</span>
              </div>
            ))}
            <button onClick={()=>setStep(1)} style={{width:"100%",padding:16,background:C.grad,color:"#fff",border:"none",borderRadius:12,fontSize:16,fontWeight:700,cursor:"pointer",marginTop:24}}>Get Started</button>
            <p style={{color:C.t3,fontSize:11,textAlign:"center",marginTop:12}}>60 seconds. Data stays in your browser.</p>
          </>}

          {step===1 && <>
            <h2 style={{color:C.t1,fontSize:24,fontWeight:800}}>About you</h2>
            <p style={{color:C.t3,fontSize:13,margin:"4px 0 24px"}}>Powers AI matching and auto-fills applications.</p>
            {[["name","Your name","Alex Chen"],["role","Current/target role","Senior SRE"],["exp","Years of experience","5"],["skills","Key skills","AWS, K8s, Python, Terraform"]].map(([k,l,ph])=>(
              <div key={k} style={{marginBottom:14}}>
                <label style={{fontSize:11,fontWeight:600,color:C.t3,fontFamily:M,letterSpacing:.5,display:"block",marginBottom:4}}>{l.toUpperCase()}</label>
                <input value={form[k]} onChange={e=>uf(k,e.target.value)} placeholder={ph}/>
              </div>
            ))}
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button onClick={()=>setStep(0)} style={{padding:"12px 20px",background:"transparent",border:`1px solid ${C.br}`,borderRadius:10,color:C.t2,cursor:"pointer"}}>←</button>
              <button onClick={()=>setStep(2)} style={{flex:1,padding:14,background:C.grad,color:"#fff",border:"none",borderRadius:10,fontWeight:700,cursor:"pointer"}}>Continue →</button>
            </div>
          </>}

          {step===2 && <>
            <h2 style={{color:C.t1,fontSize:24,fontWeight:800}}>Application defaults</h2>
            <p style={{color:C.t3,fontSize:13,margin:"4px 0 24px"}}>Auto-fills when you apply.</p>
            {[["notice","Notice period","30 days"],["comp","Current compensation","$120k / 25 LPA"],["expected","Expected compensation","$150-180k"],["visa","Work authorization","US Citizen / No visa needed"]].map(([k,l,ph])=>(
              <div key={k} style={{marginBottom:14}}>
                <label style={{fontSize:11,fontWeight:600,color:C.t3,fontFamily:M,letterSpacing:.5,display:"block",marginBottom:4}}>{l.toUpperCase()}</label>
                <input value={form[k]} onChange={e=>uf(k,e.target.value)} placeholder={ph}/>
              </div>
            ))}
            <label style={{fontSize:11,fontWeight:600,color:C.t3,fontFamily:M,display:"block",marginBottom:6}}>WORK MODE</label>
            <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
              {["Remote","Hybrid","Onsite","No Preference"].map(m=>(<Chip key={m} active={form.mode===m} onClick={()=>uf("mode",m)}>{m}</Chip>))}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(1)} style={{padding:"12px 20px",background:"transparent",border:`1px solid ${C.br}`,borderRadius:10,color:C.t2,cursor:"pointer"}}>←</button>
              <button onClick={finishSetup} style={{flex:1,padding:14,background:C.grad,color:"#fff",border:"none",borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:16}}>Launch Flint 🔥</button>
            </div>
          </>}
        </div>
      </div>
    );
  }

  // ── Main App ──
  const nav = [{id:"hunt",ico:"🔍",l:"Hunt"},{id:"tracked",ico:"📋",l:"Tracked"},{id:"vault",ico:"👤",l:"Vault"},{id:"ai",ico:"⚡",l:"AI Lab"}];

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      {/* Header */}
      <div style={{padding:"14px 20px",display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${C.br}`}}>
        <span style={{fontSize:20}}>🔥</span>
        <span style={{fontSize:18,fontWeight:900,background:C.grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>FLINT</span>
        <div style={{flex:1}}/>
        <span style={{width:7,height:7,borderRadius:99,background:CFG.SUPABASE_URL?C.grn:C.acc,animation:"pulse 2s infinite"}}/>
        <span style={{fontSize:10,fontFamily:M,color:C.t3}}>{CFG.SUPABASE_URL?"LIVE":"DEMO"}</span>
      </div>

      {/* Nav */}
      <div style={{display:"flex",borderBottom:`1px solid ${C.br}`,background:C.c1}}>
        {nav.map(n=>(<button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,padding:"10px 4px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,border:"none",background:tab===n.id?C.bg:"transparent",borderBottom:tab===n.id?`2px solid ${C.acc}`:`2px solid transparent`,color:tab===n.id?C.acc:C.t3,cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:M}}><span style={{fontSize:16}}>{n.ico}</span>{n.l}</button>))}
      </div>

      <div style={{maxWidth:660,margin:"0 auto",padding:"16px 16px 60px"}}>

        {tab==="hunt" && <>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search jobs..." onKeyDown={e=>e.key==="Enter"&&doSearch()} style={{flex:1,fontSize:15,padding:"13px 16px"}}/>
            <button onClick={doSearch} disabled={loading} style={{padding:"0 22px",background:loading?C.c2:C.grad,color:loading?C.t3:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:800,cursor:loading?"wait":"pointer"}}>HUNT</button>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>{QUICK.map(p=><Chip key={p} active={search===p} onClick={()=>setSearch(p)}>{p}</Chip>)}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>{CATS.map(c=><Chip key={c} active={cat===c} color={C.pur} onClick={()=>setCat(c)}>{c}</Chip>)}</div>
          {loading && <ScanBar/>}
          {status && <p style={{fontSize:11,fontFamily:M,color:C.t3,margin:"0 0 12px"}}>{status} · {filtered.length} showing</p>}
          <div style={{display:"flex",flexDirection:"column",gap:12}}>{filtered.map(j=><JobCard key={j.id} job={j} applied={applied.includes(j.id)} onApply={j=>setApplyM(j)} onMatch={j=>setMatchM(j)}/>)}</div>
          {filtered.length===0 && !loading && <p style={{textAlign:"center",color:C.t3,padding:40}}>No jobs yet. {CFG.SUPABASE_URL?"Try a different search.":"Connect Supabase to load scraped jobs."}</p>}
        </>}

        {tab==="tracked" && <>
          <div style={{fontSize:10,fontFamily:M,letterSpacing:2,color:C.acc,marginBottom:6}}>APPLICATIONS</div>
          <h2 style={{color:C.t1,fontSize:24,fontWeight:800,marginBottom:20}}>{appliedJobs.length} tracked</h2>
          {appliedJobs.map((j,i)=>(
            <div key={i} style={{background:C.c1,border:`1px solid ${C.br}`,borderRadius:14,padding:16,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",animation:"up .3s ease"}}>
              <div>
                <p style={{fontSize:15,fontWeight:700,color:C.t1}}>{j.title}</p>
                <p style={{fontSize:13,color:C.t2,marginTop:3}}>{j.company} · {j.location}</p>
                <p style={{fontSize:10,color:C.t3,fontFamily:M,marginTop:4}}>{new Date(j.appliedAt).toLocaleDateString()} via {j.source}</p>
              </div>
              <a href={j.url} target="_blank" rel="noopener noreferrer" style={{color:C.blu,padding:8}}>↗</a>
            </div>
          ))}
          {!appliedJobs.length && <p style={{color:C.t3,fontSize:13}}>Apply to jobs from Hunt tab.</p>}
        </>}

        {tab==="vault" && <>
          <div style={{fontSize:10,fontFamily:M,letterSpacing:2,color:C.acc,marginBottom:6}}>VAULT</div>
          <h2 style={{color:C.t1,fontSize:24,fontWeight:800,marginBottom:4}}>Profile & saved answers</h2>
          <p style={{color:C.t3,fontSize:13,marginBottom:20}}>Auto-fills every application.</p>
          <div style={{background:C.c1,border:`1px solid ${C.br}`,borderRadius:14,padding:18,marginBottom:20}}>
            {Object.entries(profile).filter(([,v])=>v).map(([k,v])=>(
              <div key={k} style={{marginBottom:10}}>
                <label style={{fontSize:10,fontFamily:M,color:C.t3,letterSpacing:1,textTransform:"uppercase"}}>{k}</label>
                <input value={v} onChange={e=>setProfile(p=>({...p,[k]:e.target.value}))} style={{marginTop:3}}/>
              </div>
            ))}
          </div>
          <div style={{fontSize:10,fontFamily:M,letterSpacing:2,color:C.pur,marginBottom:10}}>SAVED Q&A ({qa.length})</div>
          {qa.map((q,i)=>(
            <div key={i} style={{background:C.c1,border:`1px solid ${C.br}`,borderRadius:10,padding:14,marginBottom:8,display:"flex",justifyContent:"space-between"}}>
              <div><p style={{fontSize:12,fontWeight:600,color:C.t2}}>{q.q}</p><p style={{fontSize:14,color:C.acc,marginTop:4}}>{q.a}</p></div>
              <button onClick={()=>setQA(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:C.red,cursor:"pointer",opacity:.6}}>×</button>
            </div>
          ))}
        </>}

        {tab==="ai" && <>
          <div style={{fontSize:10,fontFamily:M,letterSpacing:2,color:C.pur,marginBottom:6}}>AI LAB</div>
          <h2 style={{color:C.t1,fontSize:24,fontWeight:800,marginBottom:4}}>Career intelligence</h2>
          <p style={{color:C.t3,fontSize:13,marginBottom:20}}>Llama 3.3 70B via Groq — free, fast, server-side</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {[{l:"📝 Resume",p:"Write a 3-line professional summary."},{l:"🎯 Interview",p:"5 interview questions with frameworks."},{l:"💰 Salary",p:"Market rate for my role and experience?"},{l:"📈 Skills",p:"What should I learn next?"},{l:"✉️ Outreach",p:"LinkedIn message to a hiring manager."}].map(p=>(
              <Chip key={p.l} color={C.pur} onClick={()=>{setAiQ(p.p);(async()=>{setAiLd(true);const r=await sb.edge("ai",{type:"chat",prompt:p.p,profile});setAiR(r?.text||"Connect Supabase for AI features.");setAiLd(false);})();}}>{p.l}</Chip>
            ))}
          </div>
          <textarea value={aiQ} onChange={e=>setAiQ(e.target.value)} placeholder="Ask anything..." rows={3} style={{marginBottom:8,resize:"vertical",lineHeight:1.6}}/>
          <button onClick={async()=>{setAiLd(true);const r=await sb.edge("ai",{type:"chat",prompt:aiQ,profile});setAiR(r?.text||"Connect Supabase.");setAiLd(false);}} disabled={aiLd||!aiQ} style={{width:"100%",padding:14,background:aiLd?C.c2:C.grad,color:aiLd?C.t3:"#fff",border:"none",borderRadius:10,fontWeight:700,cursor:aiLd?"wait":"pointer"}}>{aiLd?"Thinking...":"⚡ Run"}</button>
          {aiR && <div style={{marginTop:16,background:C.c1,border:`1px solid ${C.br}`,borderRadius:14,padding:18,whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.8,color:C.t2}}>{aiR}</div>}
        </>}
      </div>

      {applyM && <ApplyModal job={applyM} qa={qa} profile={profile} onClose={()=>setApplyM(null)} onApply={handleApply}/>}
      {matchM && <MatchModal job={matchM} profile={profile} onClose={()=>setMatchM(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
